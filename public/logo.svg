<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="brandShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feOffset dy="2" in="blur" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left bracket — dashed corner -->
  <path d="M 80,40 L 60,40 Q 40,40 40,60 L 40,80" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M 40,100 L 40,102" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M 40,118 L 40,120" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M 40,140 Q 40,160 60,160 L 80,160" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Right bracket — solid corner -->
  <path d="M 120,40 L 140,40 Q 160,40 160,60 L 160,80" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M 160,120 L 160,140 Q 160,160 140,160 L 120,160" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Center play triangle -->
  <path d="M 85,75 L 85,125 L 130,100 Z" fill="url(#brandGrad)" filter="url(#brandShadow)"/>
</svg>
